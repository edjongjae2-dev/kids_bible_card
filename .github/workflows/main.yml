name: Daily Bible Card

on:
  schedule:
    - cron: '50 19 * * *'  # 한국시간 오전 4:50 시작 (5:10 도착 타겟)
  workflow_dispatch:

# 🌟 이 부분을 추가해 주세요! (로봇이 파일을 쓸 수 있게 허용)
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          # 로봇이 글을 쓰려면 전체 기록이 필요합니다.
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests Pillow

      - name: Run script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
